version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install --legacy-peer-deps        build:
          commands:
            - npm run build --workspace=packages/shared
            # Print to confirm Amplify is passing the env var into the build
            - echo "VITE_SOCKET_URL=$VITE_SOCKET_URL"
            - npm run build --workspace=packages/client
      artifacts:
        baseDirectory: packages/client/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - packages/shared/node_modules/**/*
          - packages/client/node_modules/**/*
    appRoot: .
