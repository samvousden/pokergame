app            = "pokergame-server"  # change to your chosen Fly app name
primary_region = "ord"               # ord=Chicago, iad=Virginia, lhr=London, sin=Singapore

[build]
  dockerfile = "../../Dockerfile"

[env]
  PORT = "5000"
  HOST = "0.0.0.0"
  # FRONTEND_URLS is set via secrets — run:
  #   flyctl secrets set FRONTEND_URLS="https://main.xxxx.amplifyapp.com"

[http_service]
  internal_port        = 5000
  force_https          = true
  auto_stop_machines   = false  # keep alive so socket connections aren't dropped
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpus   = 1

[checks]
  [checks.health]
    port     = 5000
    type     = "http"
    interval = "15s"
    timeout  = "5s"
    method   = "GET"
    path     = "/health"
