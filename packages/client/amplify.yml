version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install all workspace dependencies from the repo root
        - cd ../../ && npm install --legacy-peer-deps
    build:
      commands:
        # Build shared package first (client depends on it)
        - cd ../../ && npm run build --workspace=packages/shared
        # Build client
        - cd ../../ && npm run build --workspace=packages/client
  artifacts:
    # Amplify runs from repo root, so path is relative to root
    baseDirectory: packages/client/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - packages/shared/node_modules/**/*
      - packages/client/node_modules/**/*
